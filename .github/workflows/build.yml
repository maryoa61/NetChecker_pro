name: Android Production Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Prepare Project
      run: |
        unzip -o NetChecker-CleanArchitecture-Android.zip -d project_dir
        # پیدا کردن مسیری که فایل gradlew در آن قرار دارد
        PROJECT_ROOT=$(find project_dir -name "gradlew" | head -n 1 | xargs dirname)
        echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
        chmod +x $PROJECT_ROOT/gradlew

    - name: Run Build
      run: |
        cd ${{ env.PROJECT_ROOT }}
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetChecker-Release-APK
        path: "**/app/build/outputs/apk/release/*.apk"
