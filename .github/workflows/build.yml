name: Android Production Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Robust Prepare Project
      run: |
        # استخراج فایل زیپ در یک پوشه موقت
        unzip -o NetChecker-CleanArchitecture-Android.zip -d temp_folder
        # انتقال تمام محتویات به ریشه پروژه، صرف‌نظر از اینکه کجاست
        find temp_folder -name "gradlew" -exec dirname {} \; | xargs -I {} cp -r {}/* .
        # اطمینان از دسترسی اجرای فایل gradlew
        chmod +x gradlew

    - name: Run Build
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetChecker-Release-APK
        path: "**/app/build/outputs/apk/release/*.apk"
