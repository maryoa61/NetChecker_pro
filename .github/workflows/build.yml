name: Android Production Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Unzip and Arrange
      run: |
        unzip -o NetChecker-CleanArchitecture-Android.zip -d project_temp
        # پیدا کردن پوشه‌ای که gradlew در آن است
        GRADLE_DIR=$(find project_temp -name "gradlew" -exec dirname {} \; | head -n 1)
        if [ -z "$GRADLE_DIR" ]; then
          echo "Error: gradlew not found!"
          exit 1
        fi
        mv $GRADLE_DIR/* .
        rm -rf project_temp

    - name: Grant Execute Permission
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "gradlew still not found!"
          exit 1
        fi

    - name: Run Build
      run: ./gradlew assembleRelease

    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NetChecker-Release-APK
        path: app/build/outputs/apk/release/*.apk
