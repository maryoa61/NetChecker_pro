name: Android Production Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Flatten and Prepare Project
      run: |
        # استخراج در یک پوشه موقت
        unzip -o NetChecker-CleanArchitecture-Android.zip -d temp_extract
        # پیدا کردن هر جایی که gradlew هست و انتقالِ محتویاتِ همون پوشه به ریشه
        # این دستور باعث میشه لایه‌های تودرتو حذف بشن و بیایم سرِ اصلِ مطلب
        find temp_extract -name "gradlew" -exec dirname {} \; | xargs -I {} cp -r {}/* .
        # حالا gradlew حتماً توی ریشه است
        chmod +x gradlew

    - name: Run Build
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NetChecker-Release-APK
        path: "app/build/outputs/apk/release/*.apk"
