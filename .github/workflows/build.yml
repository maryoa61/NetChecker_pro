name: Android Production Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Unzip and Smart Arrange Project
      run: |
        if [ -f NetChecker-CleanArchitecture-Android.zip ]; then
          echo "Unzipping project..."
          unzip -o NetChecker-CleanArchitecture-Android.zip -d extracted_project
          rm NetChecker-CleanArchitecture-Android.zip
          
          GRADLE_ROOT=$(find extracted_project -name "settings.gradle.kts" -exec dirname {} \; | head -n 1)
          if [ ! -z "$GRADLE_ROOT" ]; then
            echo "Found project root at $GRADLE_ROOT, moving files to workspace root..."
            cp -r $GRADLE_ROOT/* .
          else
            echo "Error: settings.gradle.kts not found in zip!"
            exit 1
          fi
          rm -rf extracted_project
        else
          echo "Zip file not found!"
          exit 1
        fi

    - name: Setup and Run Build via Gradle Action
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Run Direct Build
      run: gradle bundleRelease

    - name: Upload Unsigned Bundle to User
      uses: actions/upload-artifact@v4
      with:
        name: NetChecker-Unsigned-Bundle
        path: app/build/outputs/bundle/release/*.aab

